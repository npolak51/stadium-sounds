# `base` must match where package.json lives in the Git repo. If your repo root IS the app
# (package.json next to this file), use "." — do not set Netlify UI "Base directory" to
# "stadium-sounds" unless the repo actually contains that subfolder.
[build]
  base = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 requires Node 20.19+ or 22.12+ (Node 18 is not supported)
  NODE_VERSION = "22"
